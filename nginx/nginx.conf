events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Docker built-in DNS resolver (127.0.0.11). `valid=10s` so we re-resolve
    # service hostnames every 10s instead of caching for the lifetime of nginx.
    # Combined with variable-based proxy_pass below, this fixes the "502 after
    # container recreate" problem where nginx kept the stale IP.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        # Upload size cap — covers file uploads via /api/articles/upload.
        # Backend code limits images to 2MB, but documents (pdf/docx/epub…) have
        # Allow large file uploads (PDF, video, etc.)
        client_max_body_size 500m;

        # Frontend — variable-based proxy_pass forces DNS re-resolution.
        location / {
            set $upstream_frontend "http://frontend:3000";
            proxy_pass $upstream_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Backend API — same pattern.
        location /api/ {
            set $upstream_backend "http://backend:8000";
            proxy_pass $upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Extended timeouts for AI generation endpoints (e.g., spark)
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Static files
        location /static/ {
            alias /usr/share/nginx/static/;
            expires 30d;
        }

        # Trip maps (static HTML pages)
        location /trips/ {
            alias /usr/share/nginx/html/trips/;
            expires 7d;
        }
    }
}
